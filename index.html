<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Gerar SQL a partir do JSON</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <script>
        (function () {
            try {
                if (localStorage.getItem('temaJSONConvertSQL') === 'escuro') {
                    document.documentElement.setAttribute('data-tema', 'escuro');
                }
            } catch (e) { }
        })();
    </script>
    <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
	<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
	<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
	  <a class="navbar-brand" href="#">Gerar SQL a partir do JSON</a>
	  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#textoNavbar" aria-controls="textoNavbar" aria-expanded="false" aria-label="Alterna navegação">
		<span class="navbar-toggler-icon"></span>
	  </button>
	  <div class="collapse navbar-collapse" id="textoNavbar">
		<ul class="navbar-nav mr-auto">
		  <li class="nav-item  active">
			<a class="nav-link" href="./index.html">Json</a>
		  </li>
		  <li class="nav-item">
			<a class="nav-link" href="./xlsx.html">XLSX</a>
		  </li>
		</ul>
	  </div>
        <button type="button" id="btnTema" class="btn btn-sm btn-tema" onclick="AlternarTema()" title="Alternar tema">
            🌙 Tema escuro
        </button>
	</nav>
        <div class="itens">
            <div class="divForm">
                <form>
					<label for='tabela'>Tabela</label>
					<input class='form-control' id='tabela' ></input>
					<div class="form-check">
						  <input class="form-check-input" type="checkbox" value="" id="checkIDsSequence">
						  <label class="form-check-label" for="checkIDsSequence">Gerar IDs a partir da Sequence</label>
					</div>
					<div style="display:none; margin:0;" id='divSequence' >
						<label for='sequence'>Sequence</label>
						<input class='form-control' id='sequence' ></input>
					</div>
					<label for='json'>JSON</label>
					<textarea class='form-control' id='json' rows='6' placeholder='Cole aqui um objeto, uma lista de objetos ou vários objetos JSON...'  onchange="ListarColunas()"></textarea>
					<div id='divColunas' style="display:none; margin:0;">
						<label for='buscarColuna'>Colunas</label>
						<input class='form-control campo-busca-coluna' id='buscarColuna' placeholder='Digite para buscar uma coluna...' oninput="FiltrarColunas()"></input>
						<fieldset class="fieldColuna" id='fieldColunas'></fieldset>
					</div>
					<div class='linha-resultado-sql'>
						<label for='sql'>INSERT</label>
						<div class='acoes-sql'>
							<span id='contadorInserts' class='contador-inserts'>0 inserts gerados</span>
							<button type='button' id='btnCopiarInserts' class='btn btn-sm btn-secondary btn-copiar-inserts' onclick='copiarInserts()' title='Copiar inserts gerados'>Copiar</button>
						</div>
					</div>
					<textarea class='form-control' id='sql' rows='6' placeholder='INSERT'></textarea>
					<br>
					  <center>
                        <button type="button" class="btn btn-danger" onclick="gerarInserts()">Gerar Inserts</button>
                    </center>
                </form>
            </div>
        </div>
        <br>
    <script src="js/theme.js"></script>
</body>

    <script src="js/script.js"></script>
</html>
